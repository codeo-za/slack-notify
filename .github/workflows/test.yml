name: "build-test"
on: # rebuild any PRs and main branch changes
  pull_request:
  push:
    branches:
      - master
      - 'releases/*'
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - id: checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false
    - id: install
      run: |
        npm ci
    - id: format-check
      run: |
        npm run format-check
    - id: lint
      run: |
        npm run lint
    - run: npm run build && npm run package
    - uses: ./
      with:
        webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
        status: ${{ job.status }}
        channel: '#actions'
        message: lint error
      if: ${{ failure() && github.event_name != 'pull_request' }}

  test:
    runs-on: ubuntu-latest
    steps:
    - id: checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        persist-credentials: false
    - id: install-and-build
      run: |
        npm ci
        npm run build
        npm run package
    - uses: ./
      with:
        webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
        status: starting
        channel: '#actions'
      if: ${{ github.event_name != 'pull_request' }}
    - id: test
      run: |
        npm run test
    - uses: ./
      with:
        webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
        status: ${{ job.status }}
        steps: ${{ toJson(steps) }}
        channel: '#actions'
        config: __tests__/fixtures/slack-legacy.yml
      if: ${{ always() && github.event_name != 'pull_request' }}
    - uses: ./
      with:
        webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
        status: ${{ job.status }}
        steps: ${{ toJson(steps) }}
        channel: '#actions'
        config: __tests__/fixtures/slack-blocks.yml
      if: ${{ always() && github.event_name != 'pull_request' }}

  build:
    runs-on: ubuntu-latest
    steps:
    - id: checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        persist-credentials: false
    - id: install-nodejs
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: 24
    - id: build
      run: |
        npm ci
        npm run all
    - uses: ./
      with:
        webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
        status: ${{ job.status }}
        steps: ${{ toJson(steps) }}
        channel: '#actions'
      if: ${{ always() && github.event_name != 'pull_request' }}
